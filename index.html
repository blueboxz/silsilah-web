<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silsilah Keluarga Besar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-flextree@2.1.2/build/d3-flextree.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-org-chart@2.6.0"></script>

    <style>
        #chart-container { width: 100%; height: 80vh; background-color: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <header class="bg-white shadow-sm border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold text-sky-700">Pohon Keluarga Besar</h1>
        <a href="admin" class="bg-sky-600 hover:bg-sky-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition">Admin Panel &rarr;</a>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div id="status" class="text-center py-20 text-slate-400">Memproses visualisasi nasab...</div>
        <div id="chart-container"></div>
    </main>

    <script>
        const INPUT_URL = "https://silsilah-api.fdewas.workers.dev"; 
        const API_URL = INPUT_URL.replace(/\/$/, "");

        async function renderTree() {
            const statusEl = document.getElementById('status');
            try {
                const [resA, resR] = await Promise.all([
                    fetch(`${API_URL}/api/anggota`, { cache: 'no-store' }),
                    fetch(`${API_URL}/api/relasi`, { cache: 'no-store' })
                ]);

                if (!resA.ok || !resR.ok) throw new Error("Gagal mengambil data.");

                const anggota = await resA.json();
                const relasi = await resR.json();

                const treeData = anggota.map(a => {
                    const r = relasi.find(rel => rel.child_id === a.id);
                    return {
                        id: a.id.toString(),
                        parentId: r ? r.parent_id.toString() : "",
                        name: a.nama_lengkap,
                        gender: a.gender
                    };
                });

                statusEl.style.display = 'none';

                // Gunakan konstruktor versi 2.6.0 yang lebih stabil untuk arsitektur ini
                new d3.OrgChart()
                    .container('#chart-container')
                    .data(treeData)
                    .nodeWidth(d => 180)
                    .nodeHeight(d => 80)
                    .nodeContent(d => `
                        <div style="background-color:white; border-left:5px solid ${d.data.gender==='L'?'#0ea5e9':'#10b981'}; border-radius:6px; box-shadow:0 2px 5px rgba(0,0,0,0.1); width:100%; height:100%; display:flex; align-items:center; padding:10px;">
                            <div style="font-weight:bold; font-size:14px; color:#1e293b;">${d.data.name}</div>
                        </div>
                    `)
                    .render();

            } catch (err) {
                statusEl.innerHTML = `<span class="text-red-500 font-bold">Error: ${err.message}</span>`;
                console.error(err);
            }
        }
        window.onload = renderTree;
    </script>
</body>
</html>
