<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silsilah Keluarga Besar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-org-chart@3.0.1"></script>
    <style>
        #chart-container { width: 100%; height: 75vh; background-color: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-white text-slate-800 font-sans min-h-screen">

    <header class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-sky-700">Pohon Keluarga Besar</h1>
            <a href="admin" class="bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded text-sm font-medium transition">Admin Panel &rarr;</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div class="text-center mb-6">
            <h2 class="text-3xl font-light mb-2">Ahlan wa Sahlan</h2>
            <p id="loading-status" class="text-sky-600 animate-pulse">Menghubungkan ke infrastruktur Cloudflare...</p>
        </div>
        <div id="chart-container"></div>
    </main>

    <script>
        const API_URL = "https://silsilah-api.fdewas.workers.dev";
        const cleanApiUrl = API_URL.replace(/\/$/, "");

        async function initFamilyTree() {
            const statusEl = document.getElementById('loading-status');
            try {
                const [resA, resR] = await Promise.all([
                    fetch(cleanApiUrl + "/api/anggota", { cache: "no-store" }),
                    fetch(cleanApiUrl + "/api/relasi", { cache: "no-store" })
                ]);

                if (!resA.ok || !resR.ok) throw new Error("Gagal mengambil data dari API.");

                const anggota = await resA.json();
                const relasi = await resR.json();

                if (anggota.length === 0) {
                    statusEl.innerHTML = "Data masih kosong. Silakan isi di Admin Panel.";
                    return;
                }

                const treeData = anggota.map(a => {
                    const r = relasi.find(rel => rel.child_id === a.id);
                    return {
                        id: a.id.toString(),
                        parentId: r ? r.parent_id.toString() : "",
                        name: a.nama_lengkap,
                        bio: a.bio || "",
                        gender: a.gender,
                        foto: a.foto_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(a.nama_lengkap)}&background=random`
                    };
                });

                statusEl.style.display = 'none';

                new d3.OrgChart()
                    .container('#chart-container')
                    .data(treeData)
                    .nodeWidth(d => 220)
                    .nodeHeight(d => 100)
                    .nodeContent(d => `
                        <div style="background:white; border-top:4px solid ${d.data.gender==='L'?'#0ea5e9':'#10b981'}; border-radius:8px; box-shadow:0 4px 6px -1px rgba(0,0,0,0.1); width:100%; height:100%; display:flex; align-items:center; padding:10px;">
                            <img src="${d.data.foto}" style="width:40px; height:40px; border-radius:50%; margin-right:10px;" />
                            <div>
                                <div style="font-size:14px; font-weight:bold;">${d.data.name}</div>
                                <div style="font-size:11px; color:#64748b;">${d.data.bio}</div>
                            </div>
                        </div>
                    `)
                    .render();
            } catch (e) {
                statusEl.innerHTML = "Error: " + e.message;
            }
        }
        window.onload = initFamilyTree;
    </script>
</body>
</html>
