<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silsilah Keluarga Besar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-org-chart@3.0.1"></script>
    <style>
        /* Styling khusus untuk kanvas silsilah agar full lebar dan bisa di-drag */
        #chart-container { width: 100%; height: 70vh; background-color: #f8fafc; border-radius: 0.75rem; border: 1px solid #e2e8f0; cursor: grab; }
        #chart-container:active { cursor: grabbing; }
    </style>
</head>
<body class="bg-white text-slate-800 font-sans min-h-screen flex flex-col">

    <header class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-sky-700">Pohon Keluarga Besar</h1>
            <nav class="flex space-x-4 text-sm font-medium text-slate-600">
                <a href="admin.html" class="bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded transition">Admin Panel &rarr;</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto px-4 py-8 w-full flex flex-col items-center">
        
        <div class="text-center mb-8 max-w-2xl">
            <h2 class="text-3xl font-light text-slate-800 mb-3">Ahlan wa Sahlan</h2>
            <p class="text-slate-500">
                Menyambung tali silaturahmi dan menjaga nasab keluarga besar kita. 
                <br><span class="text-xs text-slate-400">(Gunakan mouse/jari untuk menggeser dan memperbesar pohon nasab)</span>
            </p>
        </div>

        <div id="loading-status" class="text-sky-600 animate-pulse mb-4">Memuat data nasab dari infrastruktur Cloudflare...</div>
        <div id="chart-container"></div>

    </main>

    <footer class="bg-slate-50 border-t border-slate-200 py-6 text-center text-sm text-slate-400">
        <p>&copy; 2026 Silsilah Keluarga. Islamic CyberTech.</p>
    </footer>

    <script>
        const API_URL = "https://silsilah-web.fdewas.workers.dev/"; // <-- GANTI DENGAN URL WORKER CLOUDFLARE ANTUM
        const cleanApiUrl = API_URL.replace(/\/$/, "");

        async function initFamilyTree() {
            const statusEl = document.getElementById('loading-status');
            try {
                // 1. Ambil Data Anggota & Relasi secara paralel
                const [resAnggota, resRelasi] = await Promise.all([
                    fetch(cleanApiUrl + "/api/anggota"),
                    fetch(cleanApiUrl + "/api/relasi")
                ]);

                if (!resAnggota.ok || !resRelasi.ok) throw new Error("Gagal mengambil data dari API.");

                const anggota = await resAnggota.json();
                const relasi = await resRelasi.json();

                // Jika data masih kosong
                if (anggota.length === 0) {
                    statusEl.innerHTML = `<span class="text-slate-500">Pohon silsilah masih kosong. Silakan tambah data di Admin Panel.</span>`;
                    return;
                }

                // 2. Transformasi Data SQL menjadi Flat Tree JSON untuk D3.js
                // Algoritma: Cari parent_id dari tabel relasi untuk setiap anggota
                const treeData = anggota.map(a => {
                    // Cari apakah anggota ini adalah 'child' di tabel relasi
                    const nasab = relasi.find(r => r.child_id === a.id);
                    return {
                        id: a.id.toString(),
                        parentId: nasab ? nasab.parent_id.toString() : "", // Jika tidak ada, jadi Root/Leluhur
                        name: a.nama_lengkap,
                        gender: a.gender,
                        status_hidup: a.status_hidup,
                        bio: a.bio || "",
                        foto: a.foto_url || (a.gender === 'L' ? 'https://ui-avatars.com/api/?background=0ea5e9&color=fff&name=' : 'https://ui-avatars.com/api/?background=10b981&color=fff&name=') + encodeURIComponent(a.nama_lengkap)
                    };
                });

                statusEl.style.display = 'none'; // Sembunyikan loading jika sukses

                // 3. Eksekusi Rendering Visual Graf (STABLE)
                new d3.OrgChart()
                    .container('#chart-container')
                    .data(treeData)
                    .nodeWidth(d => 220)
                    .nodeHeight(d => 100)
                    .childrenMargin(d => 50)
                    .compactMarginBetween(d => 30)
                    .compactMarginPair(d => 30)
                    .nodeContent(function(d) {
                        // Styling Node Anggota (Minimalis & Elegan)
                        const colorBord = d.data.gender === 'L' ? '#0ea5e9' : '#10b981'; // Biru untuk Ikhwan, Hijau untuk Akhwat
                        const wafatTag = d.data.status_hidup === 0 ? `<div style="font-size:10px; color:#ef4444; margin-top:2px;">Rahimahullah</div>` : '';
                        
                        return `
                            <div style="background-color: white; border-top: 4px solid ${colorBord}; border-radius: 8px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; height: 100%; display: flex; align-items: center; padding: 10px; font-family: ui-sans-serif, system-ui, sans-serif;">
                                <img src="${d.data.foto}" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #f1f5f9; margin-right: 12px;" alt="Foto"/>
                                <div style="flex-grow: 1; overflow: hidden;">
                                    <div style="font-size: 14px; font-weight: 600; color: #1e293b; white-space: nowrap; text-overflow: ellipsis; overflow: hidden;">${d.data.name}</div>
                                    ${wafatTag}
                                    <div style="font-size: 11px; color: #64748b; margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${d.data.bio}</div>
                                </div>
                            </div>
                        `;
                    })
                    .render();

            } catch (error) {
                statusEl.innerHTML = `<span class="text-red-600 font-semibold">✗ Error Visualisasi: ${error.message}</span>`;
            }
        }

        window.onload = initFamilyTree;
    </script>
</body>
</html>
