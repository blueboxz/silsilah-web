<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silsilah Keluarga Besar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-org-chart@3.1.0"></script>
    <style>
        #chart-container { width: 100%; height: 80vh; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold text-sky-700">Pohon Keluarga Besar</h1>
        <a href="admin" class="bg-sky-600 hover:bg-sky-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition">Admin Panel</a>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div id="status" class="text-center py-20 text-slate-400 animate-pulse">Menghubungkan ke infrastruktur Cloudflare...</div>
        <div id="chart-container" class="hidden shadow-xl bg-white"></div>
    </main>

<script>
        // STABLE IS PRIORITY: Sanitasi URL Otomatis
        const INPUT_URL = "https://silsilah-api.fdewas.workers.dev"; 
        // Memastikan tidak ada trailing slash di akhir URL base
        const API_URL = INPUT_URL.replace(/\/$/, "");

        async function renderTree() {
            const statusEl = document.getElementById('status');
            const chartEl = document.getElementById('chart-container');

            try {
                // Memastikan pemanggilan menggunakan path tunggal /api/...
                const [resA, resR] = await Promise.all([
                    fetch(`${API_URL}/api/anggota`, { cache: 'no-store' }),
                    fetch(`${API_URL}/api/relasi`, { cache: 'no-store' })
                ]);

                if (!resA.ok || !resR.ok) {
                    throw new Error(`Server merespon A:${resA.status} R:${resR.status}. Pastikan endpoint API sudah benar.`);
                }

                const anggota = await resA.json();
                const relasi = await resR.json();

                if (anggota.length === 0) {
                    statusEl.innerHTML = "Database kosong. Silakan isi data di Admin Panel.";
                    return;
                }

                // Transformasi data untuk D3 Org Chart
                const treeData = anggota.map(a => {
                    const r = relasi.find(rel => rel.child_id === a.id);
                    return {
                        id: a.id.toString(),
                        parentId: r ? r.parent_id.toString() : "",
                        name: a.nama_lengkap,
                        gender: a.gender,
                        bio: a.bio || "Anggota Keluarga"
                    };
                });

                statusEl.style.display = 'none';
                chartEl.classList.remove('hidden');

                // Render Chart
                new d3.OrgChart()
                    .container('#chart-container')
                    .data(treeData)
                    .nodeWidth(d => 200)
                    .nodeHeight(d => 100)
                    .nodeContent(d => {
                        const color = d.data.gender === 'L' ? '#0284c7' : '#059669';
                        return `
                        <div style="background-color:white; border-top:5px solid ${color}; border-radius:8px; box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.1); width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; padding:15px; font-family:sans-serif;">
                            <div style="font-size:14px; font-weight:bold; color:#1e293b; margin-bottom:4px;">${d.data.name}</div>
                            <div style="font-size:11px; color:#64748b; line-height:1.2;">${d.data.bio}</div>
                        </div>
                        `;
                    })
                    .render();

            } catch (err) {
                statusEl.innerHTML = `<span class="text-red-500 font-bold">Error Visualisasi: ${err.message}</span>`;
                console.error("Detail Error:", err);
            }
        }

        window.onload = renderTree;
    </script>
</body>
</html>
