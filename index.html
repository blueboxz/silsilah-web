<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silsilah Keluarga Besar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // STABLE IS PRIORITY: Endpoint API Utama
        const API_URL = "https://silsilah-api.fdewas.workers.dev/"; // <-- GANTI URL INI DENGAN URL WORKER CLOUDFLARE ANTUM

        async function initApp() {
            const statusEl = document.getElementById('api-status');
            try {
                // Cek koneksi ke Golden Image API
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Jaringan bermasalah");
                const text = await response.text();
                statusEl.innerHTML = `<span class="text-green-600 font-semibold">✓ API Terhubung: ${text}</span>`;
            } catch (error) {
                statusEl.innerHTML = `<span class="text-red-600 font-semibold">✗ Gagal terhubung ke API. Pastikan URL Worker sudah benar.</span>`;
            }
        }
        window.onload = initApp;
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <header class="bg-white shadow-sm border-b border-slate-200">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-sky-700">Pohon Keluarga</h1>
            <nav class="hidden md:flex space-x-6 text-sm font-medium text-slate-600">
                <a href="#" class="hover:text-sky-600 transition">Beranda</a>
                <a href="#" class="hover:text-sky-600 transition">Pohon Silsilah</a>
                <a href="#" class="hover:text-sky-600 transition">Galeri</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow max-w-5xl mx-auto px-4 py-8 w-full">
        <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-8 text-center">
            <h2 class="text-3xl font-light text-slate-800 mb-4">Ahlan wa Sahlan</h2>
            <p class="text-slate-500 mb-8 max-w-2xl mx-auto">
                Menyambung tali silaturahmi, menjaga nasab, dan merawat sejarah keluarga besar kita sesuai dengan nilai-nilai Syariah.
            </p>
            
            <div class="bg-slate-50 rounded-lg p-4 border border-slate-200 inline-block">
                <p class="text-sm text-slate-500 mb-1">Status Sistem Cloudflare:</p>
                <div id="api-status" class="text-sm">Menghubungkan ke API...</div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 py-6 text-center text-sm text-slate-400">
        <p>&copy; 2026 Silsilah Keluarga. Islamic CyberTech.</p>
    </footer>

</body>
</html>
