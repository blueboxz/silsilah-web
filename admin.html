<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Silsilah Keluarga</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <header class="bg-white shadow-sm border-b border-slate-200">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-sky-700">Admin Panel Silsilah</h1>
            <a href="index.html" class="text-sm font-medium text-slate-500 hover:text-sky-600 transition">&larr; Kembali ke Beranda</a>
        </div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto px-4 py-8 w-full space-y-8">
        
        <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 md:p-8">
            <h2 class="text-xl font-semibold text-slate-800 mb-6 border-b pb-3">1. Tambah Profil Anggota</h2>
            <div id="status-msg-anggota" class="mb-4"></div>
            <form id="form-anggota" onsubmit="submitData(event)" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nama Lengkap *</label>
                        <input type="text" id="nama" required class="w-full border border-slate-300 rounded p-2 focus:ring-sky-500 focus:border-sky-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Jenis Kelamin *</label>
                        <select id="gender" required class="w-full border border-slate-300 rounded p-2 focus:ring-sky-500 focus:border-sky-500 bg-white">
                            <option value="">Pilih...</option>
                            <option value="L">Laki-laki</option>
                            <option value="P">Perempuan</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Tanggal Lahir</label>
                        <input type="date" id="tanggal_lahir" class="w-full border border-slate-300 rounded p-2 focus:ring-sky-500 focus:border-sky-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Status Kehidupan</label>
                        <select id="status_hidup" class="w-full border border-slate-300 rounded p-2 focus:ring-sky-500 focus:border-sky-500 bg-white">
                            <option value="1">Masih Hidup</option>
                            <option value="0">Telah Wafat (Rahimahullah)</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">URL Foto (Opsional)</label>
                    <input type="url" id="foto_url" placeholder="https://contoh.com/foto.jpg" class="w-full border border-slate-300 rounded p-2 focus:ring-sky-500 focus:border-sky-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Biodata / Cerita Singkat</label>
                    <textarea id="bio" rows="2" class="w-full border border-slate-300 rounded p-2 focus:ring-sky-500 focus:border-sky-500"></textarea>
                </div>
                <div class="pt-2">
                    <button type="submit" id="btn-submit-anggota" class="bg-sky-600 hover:bg-sky-700 text-white font-medium py-2 px-6 rounded transition">
                        Simpan Data Anggota
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 md:p-8 border-t-4 border-t-emerald-500">
            <h2 class="text-xl font-semibold text-slate-800 mb-6 border-b pb-3">2. Sambung Garis Nasab (Relasi)</h2>
            <p class="text-sm text-slate-500 mb-5">Pilih siapa orang tua dan siapa anak untuk membentuk pohon silsilah.</p>
            
            <div id="status-msg-relasi" class="mb-4"></div>
            
            <form id="form-relasi" onsubmit="submitRelasi(event)" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-5 items-end">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Orang Tua (Bapak/Ibu) *</label>
                        <select id="parent_id" required class="w-full border border-slate-300 rounded p-2 focus:ring-emerald-500 focus:border-emerald-500 bg-white">
                            <option value="">Memuat data...</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Status Relasi *</label>
                        <select id="jenis_relasi" required class="w-full border border-slate-300 rounded p-2 focus:ring-emerald-500 focus:border-emerald-500 bg-slate-50">
                            <option value="kandung">Anak Kandung</option>
                            <option value="tiri">Anak Tiri</option>
                            <option value="susuan">Anak Susuan</option>
                            <option value="adopsi">Anak Adopsi</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Anak *</label>
                        <select id="child_id" required class="w-full border border-slate-300 rounded p-2 focus:ring-emerald-500 focus:border-emerald-500 bg-white">
                            <option value="">Memuat data...</option>
                        </select>
                    </div>
                </div>
                
                <div class="pt-4">
                    <button type="submit" id="btn-submit-relasi" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 px-4 rounded transition">
                        Sambung Nasab
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        const API_URL = "https://silsilah-api.fdewas.workers.dev/"; // <-- GANTI DENGAN URL WORKER CLOUDFLARE ANTUM, JANGAN HAPUS TANDA KUTIPNYA
        const cleanApiUrl = API_URL.replace(/\/$/, "");

        async function loadAnggota() {
            try {
                const response = await fetch(cleanApiUrl + "/api/anggota");
                if (!response.ok) throw new Error("Gagal memuat data anggota");
                
                const anggota = await response.json();
                let options = '<option value="">Pilih Anggota...</option>';
                
                anggota.forEach(a => {
                    options += `<option value="${a.id}">${a.nama_lengkap} (${a.gender})</option>`;
                });
                
                document.getElementById('parent_id').innerHTML = options;
                document.getElementById('child_id').innerHTML = options;
            } catch (error) {
                console.error("Error loading anggota:", error);
            }
        }

        window.addEventListener('DOMContentLoaded', loadAnggota);

        async function submitData(event) {
            event.preventDefault();
            const btnSubmit = document.getElementById('btn-submit-anggota');
            const statusMsg = document.getElementById('status-msg-anggota');
            
            const payload = {
                nama_lengkap: document.getElementById('nama').value,
                gender: document.getElementById('gender').value,
                tanggal_lahir: document.getElementById('tanggal_lahir').value,
                status_hidup: parseInt(document.getElementById('status_hidup').value),
                bio: document.getElementById('bio').value,
                foto_url: document.getElementById('foto_url').value
            };

            try {
                btnSubmit.disabled = true;
                btnSubmit.innerText = "Menyimpan ke Database...";
                statusMsg.innerHTML = `<p class="text-sky-600 bg-sky-50 p-3 rounded border border-sky-200">Mengirim data...</p>`;
                
                const response = await fetch(cleanApiUrl + "/api/anggota", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const textResult = await response.text(); 
                if (!response.ok) throw new Error(`Server menolak (Status HTTP ${response.status}). Detail: ${textResult}`);

                statusMsg.innerHTML = `<p class="text-green-600 bg-green-50 p-3 rounded border border-green-200">Alhamdulillah, data ${payload.nama_lengkap} berhasil disimpan!</p>`;
                document.getElementById('form-anggota').reset();
                
                loadAnggota();

            } catch (error) {
                statusMsg.innerHTML = `<p class="text-red-600 bg-red-50 p-3 rounded border border-red-200"><b>Troubleshooting:</b><br>${error.message}</p>`;
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Simpan Data Anggota";
            }
        }

        async function submitRelasi(event) {
            event.preventDefault();
            const btnSubmit = document.getElementById('btn-submit-relasi');
            const statusMsg = document.getElementById('status-msg-relasi');
            
            const payload = {
                parent_id: parseInt(document.getElementById('parent_id').value),
                child_id: parseInt(document.getElementById('child_id').value),
                jenis_relasi: document.getElementById('jenis_relasi').value
            };

            try {
                btnSubmit.disabled = true;
                btnSubmit.innerText = "Menyambungkan Nasab...";
                statusMsg.innerHTML = `<p class="text-sky-600 bg-sky-50 p-3 rounded border border-sky-200">Memproses relasi...</p>`;
                
                const response = await fetch(cleanApiUrl + "/api/relasi", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const textResult = await response.text(); 
                if (!response.ok) throw new Error(`Server menolak. Detail: ${textResult}`);

                statusMsg.innerHTML = `<p class="text-green-600 bg-green-50 p-3 rounded border border-green-200">Alhamdulillah, garis nasab berhasil disambungkan!</p>`;
                document.getElementById('form-relasi').reset();

            } catch (error) {
                statusMsg.innerHTML = `<p class="text-red-600 bg-red-50 p-3 rounded border border-red-200"><b>Troubleshooting:</b><br>${error.message}</p>`;
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Sambung Nasab";
            }
        }
    </script>
</body>
</html>
