<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Silsilah Keluarga</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <header class="bg-white shadow-sm border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold text-sky-700">Manajemen Silsilah</h1>
        <a href="index.html" class="text-sm font-medium text-slate-500 hover:text-sky-600">&larr; Beranda</a>
    </header>

    <main class="max-w-4xl mx-auto p-4 md:p-8 space-y-8">
        
        <div class="bg-amber-50 border border-amber-200 rounded-xl p-6 shadow-sm text-center">
            <h2 class="text-sm font-bold text-amber-800 uppercase tracking-wider mb-2">Otentikasi Admin</h2>
            <input type="password" id="admin_token" placeholder="Masukkan Admin Token..." 
                   class="w-full max-w-xs border border-amber-300 rounded-lg p-2 text-center focus:ring-amber-500 focus:border-amber-500 outline-none">
            <p class="text-xs text-amber-600 mt-2 italic">Token ini wajib diisi untuk setiap operasi simpan data.</p>
        </div>

        <div id="global-status" class="hidden p-4 rounded-lg text-sm font-medium"></div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
            <h2 class="text-lg font-bold mb-6 border-b pb-2 text-slate-700">1. Tambah Profil Anggota</h2>
            <form id="form-anggota" onsubmit="submitAnggota(event)" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="nama" placeholder="Nama Lengkap *" required class="border p-2 rounded w-full">
                    <select id="gender" required class="border p-2 rounded w-full bg-white">
                        <option value="">Pilih Gender *</option>
                        <option value="L">Laki-laki (Ikhwan)</option>
                        <option value="P">Perempuan (Akhwat)</option>
                    </select>
                </div>
                <textarea id="bio" placeholder="Biodata singkat..." class="border p-2 rounded w-full h-20"></textarea>
                <button type="submit" id="btn-a" class="bg-sky-600 hover:bg-sky-700 text-white px-6 py-2 rounded-lg font-medium transition w-full md:w-auto">Simpan Anggota</button>
            </form>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 border-t-4 border-t-emerald-500">
            <h2 class="text-lg font-bold mb-6 border-b pb-2 text-slate-700">2. Sambung Garis Nasab</h2>
            <form id="form-relasi" onsubmit="submitRelasi(event)" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                    <div>
                        <label class="text-xs font-bold text-slate-500 ml-1">Orang Tua</label>
                        <select id="parent_id" required class="border p-2 rounded w-full bg-white mt-1"></select>
                    </div>
                    <div class="text-center text-slate-400 pb-2 hidden md:block">&rarr;</div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 ml-1">Anak</label>
                        <select id="child_id" required class="border p-2 rounded w-full bg-white mt-1"></select>
                    </div>
                </div>
                <button type="submit" id="btn-r" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg font-medium transition w-full">Sambung Nasab</button>
            </form>
        </div>

    </main>

    <script>
        const API_URL = "https://silsilah-api.fdewas.workers.dev"; // URL WORKER ANTUM
        const cleanApiUrl = API_URL.replace(/\/$/, "");

        const showStatus = (msg, isError = false) => {
            const el = document.getElementById('global-status');
            el.innerText = msg;
            el.className = `p-4 rounded-lg text-sm font-medium mb-4 ${isError ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}`;
            el.classList.remove('hidden');
            window.scrollTo(0, 0);
        };

        async function loadDropdowns() {
            try {
                const res = await fetch(`${cleanApiUrl}/api/anggota`);
                const data = await res.json();
                let options = '<option value="">Pilih...</option>';
                data.forEach(a => options += `<option value="${a.id}">${a.nama_lengkap} (${a.gender})</option>`);
                document.getElementById('parent_id').innerHTML = options;
                document.getElementById('child_id').innerHTML = options;
            } catch (e) { console.error("Gagal load dropdown", e); }
        }

        async function submitAnggota(e) {
            e.preventDefault();
            const token = document.getElementById('admin_token').value;
            if (!token) return alert("Admin Token wajib diisi!");

            const payload = {
                nama_lengkap: document.getElementById('nama').value,
                gender: document.getElementById('gender').value,
                bio: document.getElementById('bio').value
            };

            try {
                const res = await fetch(`${cleanApiUrl}/api/anggota`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (!res.ok) throw new Error(result.error || "Gagal menyimpan");
                
                showStatus("Alhamdulillah, anggota berhasil ditambahkan.");
                document.getElementById('form-anggota').reset();
                loadDropdowns();
            } catch (err) { showStatus(err.message, true); }
        }

        async function submitRelasi(e) {
            e.preventDefault();
            const token = document.getElementById('admin_token').value;
            const payload = {
                parent_id: parseInt(document.getElementById('parent_id').value),
                child_id: parseInt(document.getElementById('child_id').value)
            };

            try {
                const res = await fetch(`${cleanApiUrl}/api/relasi`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (!res.ok) throw new Error(result.error || "Gagal menyambung");
                
                showStatus("Alhamdulillah, garis nasab berhasil disambungkan.");
                document.getElementById('form-relasi').reset();
            } catch (err) { showStatus(err.message, true); }
        }

        window.onload = loadDropdowns;
    </script>
</body>
</html>
